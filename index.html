<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schweizer Seen</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js"  type="module" ></script>
</head>
<body>
    <header>
        <h1>Und wo schwimmst du heute?</h1>
        <h2>Dein Wassertemperatur Guide</h2>
        <!-- Sonnenschirm -->
        <img src="assets/IM2_Sonneschirm.png" alt="Sonnenschirm" class="sonnenschirm">

    </header>

<main class="container_karte">
    <div class="karte">
        <img src="assets/karte_schweiz.png" alt="Karte der Schweiz" class="map">

        <!-- flüsse -->
        <div id="gruppe_fluesse">
            <button class="pin" id="pin_reuss">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Reuss">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Reuss Hover">
            </button>
            <button class="pin" id="pin_aare">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Aare">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Aare Hover">
            </button>
            <button class="pin" id="pin_linth">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Linth">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Linth Hover">
            </button>
            <button class="pin" id="pin_rhone">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Rhone">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Rhone Hover">
            </button>
            <button class="pin" id="pin_rhein">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Rhein">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Rhein Hover">
            </button>
        </div>

        <!-- seen -->
        <div id="gruppe_seen">
            <button class="pin" id="pin_genfersee">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Genfersee">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Genfersee Hover">
            </button>
            <button class="pin" id="pin_neuenburgersee">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Neuenburgersee">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Neuenburgersee Hover">
            </button>
            <button class="pin" id="pin_vierwaldstaettersee">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Vierwaldstättersee">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Vierwaldstättersee Hover">
            </button>
            <button class="pin" id="pin_lago_maggiore">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Lago Maggiore">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Lago Maggiore Hover">
            </button>
            <button class="pin" id="pin_bodensee">
                <img class="pin_normal" src="assets/pin_gelb.png" alt="Pin Bodensee">
                <img class="pin_hover" src="assets/pin_blau.png" alt="Pin Bodensee Hover">
            </button>
        </div>

        <!-- Infobox -->
        <div class="infobox" id="infobox">
            <button class="infobox_close" id="infobox_close">✕</button>
            <h1 id="infobox_name">Name</h1>
            <h4>Aktuelle Temperatur</h4>
            <div class="infobox_grid">
                <h2 id="grid_wasser">Wasser</h2>
                <h2 id="grid_wassertemp">XX°C</h2>

                <h2 id="grid_luft">Luft</h2>
                <h2 id="grid_lufttemp">XX°C</h2>
            </div>
        </div>

    </div>
</main>


    <footer>
         <div class="footer_wasser">
            <dotlottie-wc
                src="https://lottie.host/a9f3d46a-0606-4140-b1db-2c520276dd65/QWC45xjVVF.lottie"
                style="width: 150px; height: 150px"
                autoplay
                loop
            ></dotlottie-wc>
            <img src="assets/footer_see.png" alt="wasser" class="footer_welle">
        </div>
        
        <p>© Nadine Steiner | IM2 | FHGR</p>
    </footer>
    
    <script src="js/script.js" type="module"></script>
</body>
</html>
